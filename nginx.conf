server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Astro Routing (fallback to index.html is NOT needed for SSG since Astro generates exact paths,
    # but we need to handle trailing slash resolution).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache Static Assets (JS, CSS, Images, Fonts) aggressively
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|png|jpe?g|webp|avif|svg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Error pages
    error_page 404 /404.html;
}
