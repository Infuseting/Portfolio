server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    # X-XSS-Protection removed (deprecated; can introduce XSS vectors in old IE)
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'";
    # Note: HSTS should be enforced at the reverse-proxy / CDN level (site runs on HTTP internally)

    # Astro SSG: all routes have pre-generated HTML files — fallback to 404 for unknown paths
    location / {
        try_files $uri $uri/index.html =404;
    }

    # Cache Static Assets (JS, CSS, Images, Fonts) aggressively
    location ~* \.(?:css|js|woff2?|eot|ttf|otf|png|jpe?g|webp|avif|svg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Error pages
    error_page 404 /404.html;
}
